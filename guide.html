<script type="text/plain" id="src-json_value">
import gleam/dict
import gleam/dynamic/decode.{type Decoder}
import gleam/json.{type Json}
import gleam/list

pub type JsonValue {
  JsonObject(fields: List(#(String, JsonValue)))
  JsonArray(items: List(JsonValue))
  JsonString(value: String)
  JsonInt(value: Int)
  JsonFloat(value: Float)
  JsonBool(value: Bool)
  JsonNull
}

pub fn decoder() -> Decoder(JsonValue) {
  decode.one_of(decode.map(decode.string, JsonString), or: [
    decode.map(decode.int, JsonInt),
    decode.map(decode.float, JsonFloat),
    decode.map(decode.bool, JsonBool),
    decode.map(decode.list(decode.recursive(decoder)), JsonArray),
    decode.map(decode.dict(decode.string, decode.recursive(decoder)), fn(d) {
      JsonObject(dict.to_list(d))
    }),
  ])
}

pub fn to_json(value: JsonValue) -> Json {
  case value {
    JsonObject(fields:) ->
      json.object(list.map(fields, fn(p) { #(p.0, to_json(p.1)) }))
    JsonArray(items:) -> json.preprocessed_array(list.map(items, to_json))
    JsonString(value:) -> json.string(value)
    JsonInt(value:) -> json.int(value)
    JsonFloat(value:) -> json.float(value)
    JsonBool(value:) -> json.bool(value)
    JsonNull -> json.null()
  }
}

pub fn get_string(input: JsonValue, key: String) -> Result(String, String) {
  case input {
    JsonObject(fields) ->
      case list.key_find(fields, key) {
        Ok(JsonString(value)) -> Ok(value)
        _ -> Error("Missing string parameter: " <> key)
      }
    _ -> Error("Tool input was not a JSON object")
  }
}

<script type="text/plain" id="src-json_value_test">
import claude_code/json_value.{type JsonValue, JsonInt, JsonString}
import gleam/json

// The one property worth proving: encode, then decode, gives back the
// original value untouched — the exact thing the agent relies on.
fn round_trip(value: JsonValue) -> Result(JsonValue, json.DecodeError) {
  value
  |> json_value.to_json
  |> json.to_string
  |> json.parse(json_value.decoder())
}

pub fn round_trip_int_test() {
  assert round_trip(JsonInt(42)) == Ok(JsonInt(42))
}

pub fn encode_string_test() {
  assert json.to_string(json_value.to_json(JsonString("hi"))) == "\"hi\""
}

<script type="text/plain" id="src-api">
import claude_code/json_value.{type JsonValue}
import gleam/dynamic/decode.{type Decoder}
import gleam/http.{Post}
import gleam/http/request
import gleam/httpc
import gleam/int
import gleam/json.{type Json}
import gleam/result

pub type Role {
  User
  Assistant
}

pub type ContentBlock {
  TextBlock(text: String)
  ToolUseBlock(id: String, name: String, input: JsonValue)
  ToolResultBlock(tool_use_id: String, content: String, is_error: Bool)
}

pub type Message {
  Message(role: Role, content: List(ContentBlock))
}

pub type StopReason {
  EndTurn
  MaxTokens
  ToolUseStop
  OtherStop(String)
}

pub type ApiResponse {
  ApiResponse(content: List(ContentBlock), stop_reason: StopReason)
}

pub type ToolDef {
  ToolDef(name: String, description: String, input_schema: Json)
}

pub type Client {
  Client(api_key: String, base_url: String)
}

pub fn create_message(
  client: Client,
  model: String,
  system_prompt: String,
  messages: List(Message),
  tools: List(ToolDef),
  max_tokens: Int,
) -> Result(ApiResponse, String) {
  let body =
    json.object([
      #("model", json.string(model)),
      #("max_tokens", json.int(max_tokens)),
      #("system", json.string(system_prompt)),
      #("messages", json.array(messages, encode_message)),
      #("tools", json.array(tools, encode_tool)),
    ])
    |> json.to_string

  use base <- result.try(
    request.to(client.base_url <> "/v1/messages")
    |> result.replace_error("Invalid base URL"),
  )

  let req =
    base
    |> request.set_method(Post)
    |> request.set_header("content-type", "application/json")
    |> request.set_header("x-api-key", client.api_key)
    |> request.set_header("anthropic-version", "2023-06-01")
    |> request.set_body(body)

  use resp <- result.try(
    httpc.send(req)
    |> result.map_error(fn(_) { "HTTP transport error" }),
  )

  case resp.status {
    200 ->
      json.parse(resp.body, response_decoder())
      |> result.map_error(fn(_) { "Failed to decode API response" })
    code -> Error("API error " <> int.to_string(code) <> ": " <> resp.body)
  }
}

fn block_decoder() -> Decoder(ContentBlock) {
  use kind <- decode.field("type", decode.string)
  case kind {
    "text" -> {
      use text <- decode.field("text", decode.string)
      decode.success(TextBlock(text:))
    }
    "tool_use" -> {
      use id <- decode.field("id", decode.string)
      use name <- decode.field("name", decode.string)
      use input <- decode.field("input", json_value.decoder())
      decode.success(ToolUseBlock(id:, name:, input:))
    }
    other -> decode.failure(TextBlock(text: ""), "ContentBlock: " <> other)
  }
}

fn stop_reason_decoder() -> Decoder(StopReason) {
  use reason <- decode.then(decode.string)
  case reason {
    "end_turn" -> decode.success(EndTurn)
    "max_tokens" -> decode.success(MaxTokens)
    "tool_use" -> decode.success(ToolUseStop)
    other -> decode.success(OtherStop(other))
  }
}

fn response_decoder() -> Decoder(ApiResponse) {
  use content <- decode.field("content", decode.list(block_decoder()))
  use stop_reason <- decode.field("stop_reason", stop_reason_decoder())
  decode.success(ApiResponse(content:, stop_reason:))
}

fn encode_message(message: Message) -> Json {
  let role = case message.role {
    User -> "user"
    Assistant -> "assistant"
  }
  json.object([
    #("role", json.string(role)),
    #("content", json.array(message.content, encode_block)),
  ])
}

fn encode_block(block: ContentBlock) -> Json {
  case block {
    TextBlock(text:) ->
      json.object([
        #("type", json.string("text")),
        #("text", json.string(text)),
      ])
    ToolUseBlock(id:, name:, input:) ->
      json.object([
        #("type", json.string("tool_use")),
        #("id", json.string(id)),
        #("name", json.string(name)),
        #("input", json_value.to_json(input)),
      ])
    ToolResultBlock(tool_use_id:, content:, is_error:) ->
      json.object([
        #("type", json.string("tool_result")),
        #("tool_use_id", json.string(tool_use_id)),
        #("content", json.string(content)),
        #("is_error", json.bool(is_error)),
      ])
  }
}

fn encode_tool(tool: ToolDef) -> Json {
  json.object([
    #("name", json.string(tool.name)),
    #("description", json.string(tool.description)),
    #("input_schema", tool.input_schema),
  ])
}

<script type="text/plain" id="src-agent_loop">
pub type AgentState {
  AgentState(
    client: Client,
    model: String,
    system_prompt: String,
    messages: List(Message),
    cwd: String,
    config: LoopConfig,
    todos: List(TodoItem),
    idle_turns: Int,
    skills: SkillLoader,
    task_store: TaskStore,
    background: Subject(background.Message),
  )
}

pub fn run(
  state: AgentState,
  query: String,
) -> Result(#(String, AgentState), String) {
  let message = Message(role: User, content: [TextBlock(text: query)])
  let state =
    AgentState(..state, messages: list.append(state.messages, [message]))
  loop(state, 0)
}

fn loop(
  state: AgentState,
  iteration: Int,
) -> Result(#(String, AgentState), String) {
  case iteration >= state.config.max_iterations {
    True -> Ok(#("(stopped: iteration cap reached)", state))
    False -> {
      let state = compact_step(state)
      use response <- result.try(api.create_message(
        state.client,
        state.model,
        state.system_prompt,
        state.messages,
        tool_defs(state.config),
        4096,
      ))
      let reply = Message(role: Assistant, content: response.content)
      let state =
        AgentState(..state, messages: list.append(state.messages, [reply]))

      case response.stop_reason {
        ToolUseStop -> {
          let #(results, state) = run_tools(response.content, state)
          loop(append_results(state, results), iteration + 1)
        }
        _ -> Ok(#(extract_text(response.content), state))
      }
    }
  }
}

fn run_tools(
  content: List(ContentBlock),
  state: AgentState,
) -> #(List(ContentBlock), AgentState) {
  list.fold(content, #([], state), fn(acc, block) {
    let #(results, current) = acc
    case block {
      ToolUseBlock(id:, name:, input:) -> {
        let #(text, is_error, next) = execute_tool(name, input, current)
        let result = ToolResultBlock(tool_use_id: id, content: text, is_error:)
        #(list.append(results, [result]), next)
      }
      _ -> acc
    }
  })
}

fn extract_text(content: List(ContentBlock)) -> String {
  content
  |> list.filter_map(fn(block) {
    case block {
      TextBlock(text:) -> Ok(text)
      _ -> Error(Nil)
    }
  })
  |> string.join("\n")
}

<script type="text/plain" id="src-main">
import claude_code/agent.{type AgentState}
import claude_code/internal/background
import claude_code/internal/skills
import claude_code/internal/stdin
import claude_code/internal/tasks
import envoy
import filepath
import gleam/io
import gleam/result
import gleam/string
import simplifile

pub fn main() -> Nil {
  let cwd = simplifile.current_directory() |> result.unwrap(".")
  case background.start(cwd) {
    Error(_) -> io.println("Failed to start background manager")
    Ok(bg) -> {
      let api_key = envoy.get("ANTHROPIC_API_KEY") |> result.unwrap("")
      let model = envoy.get("MODEL_ID") |> result.unwrap("claude-sonnet-4-6")
      let skill_loader = skills.load(filepath.join(cwd, "skills"))
      let store = tasks.init(filepath.join(cwd, ".tasks"))
      repl(agent.new(api_key, model, cwd, skill_loader, store, bg))
    }
  }
}

fn repl(state: AgentState) -> Nil {
  io.print("> ")
  case stdin.get_line("") {
    Error(_) -> io.println("")
    Ok(line) ->
      case string.trim(line) {
        "" -> repl(state)
        "exit" | "quit" -> Nil
        query ->
          case agent.run(state, query) {
            Ok(#(reply, next)) -> {
              io.println(reply)
              repl(next)
            }
            Error(message) -> {
              io.println("Error: " <> message)
              repl(state)
            }
          }
      }
  }
}
</script>
<script type="text/plain" id="src-agent_dispatch">
fn execute_tool(
  name: String,
  input: JsonValue,
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case name {
    "bash" -> stateless(run_bash(input, state.cwd), state)
    "read_file" -> stateless(file_ops.read_file(input, state.cwd), state)
    "write_file" -> stateless(file_ops.write_file(input, state.cwd), state)
    "edit_file" -> stateless(file_ops.edit_file(input, state.cwd), state)
    "todo" -> handle_todo(input, state)
    "agent" -> stateless(run_subagent(input, state), state)
    "load_skill" -> handle_load_skill(input, state)
    "compact" -> handle_compact(state)
    "task_create" -> handle_task_create(input, state)
    "task_update" -> handle_task_update(input, state)
    "task_list" -> #(tasks.render(tasks.list_all(state.task_store)), False, state)
    "task_get" -> handle_task_get(input, state)
    "bg_run" -> handle_bg_run(input, state)
    "bg_check" -> #(background.render(background.drain(state.background)), False, state)
    other -> #("Unknown tool: " <> other, True, state)
  }
}

fn stateless(
  outcome: Result(String, String),
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case outcome {
    Ok(text) -> #(text, False, state)
    Error(message) -> #(message, True, state)
  }
}

fn run_bash(input: JsonValue, cwd: String) -> Result(String, String) {
  use command <- result.try(get_string(input, "command"))
  shell.execute(command, cwd)
}

import filepath
import gleam/list
import gleam/string

pub fn resolve(relative: String, cwd: String) -> Result(String, String) {
  let joined = case filepath.is_absolute(relative) {
    True -> relative
    False -> filepath.join(cwd, relative)
  }
  case list.contains(filepath.split(joined), "..") {
    True -> Error("Path escapes workspace: " <> relative)
    False ->
      case string.starts_with(joined, cwd) {
        True -> Ok(joined)
        False -> Error("Path escapes workspace: " <> relative)
      }
  }
}

<script type="text/plain" id="src-file_ops">
import claude_code/internal/sandbox
import claude_code/json_value.{type JsonValue, get_string}
import filepath
import gleam/int
import gleam/result
import gleam/string
import simplifile

pub fn read_file(input: JsonValue, cwd: String) -> Result(String, String) {
  use path <- result.try(get_string(input, "path"))
  use resolved <- result.try(sandbox.resolve(path, cwd))
  use content <- result.try(
    simplifile.read(resolved) |> result.map_error(simplifile.describe_error),
  )
  Ok(content)
}

pub fn write_file(input: JsonValue, cwd: String) -> Result(String, String) {
  use path <- result.try(get_string(input, "path"))
  use content <- result.try(get_string(input, "content"))
  use resolved <- result.try(sandbox.resolve(path, cwd))
  use _ <- result.try(
    simplifile.create_directory_all(filepath.directory_name(resolved))
    |> result.map_error(simplifile.describe_error),
  )
  use _ <- result.try(
    simplifile.write(to: resolved, contents: content)
    |> result.map_error(simplifile.describe_error),
  )
  Ok(
    "Wrote "
    <> int.to_string(string.byte_size(content))
    <> " bytes to "
    <> path,
  )
}

pub fn edit_file(input: JsonValue, cwd: String) -> Result(String, String) {
  use path <- result.try(get_string(input, "path"))
  use old <- result.try(get_string(input, "old_text"))
  use new <- result.try(get_string(input, "new_text"))
  use resolved <- result.try(sandbox.resolve(path, cwd))
  use content <- result.try(
    simplifile.read(resolved) |> result.map_error(simplifile.describe_error),
  )
  use edited <- result.try(replace_once(content, old, new))
  use _ <- result.try(
    simplifile.write(to: resolved, contents: edited)
    |> result.map_error(simplifile.describe_error),
  )
  Ok("Edited " <> path)
}

fn replace_once(
  content: String,
  old: String,
  new: String,
) -> Result(String, String) {
  case string.split_once(content, old) {
    Ok(#(before, after)) -> Ok(before <> new <> after)
    Error(_) -> Error("old_text not found in file")
  }
}
</script>
<script type="text/plain" id="src-todos">
import gleam/int
import gleam/list
import gleam/string

pub type TodoStatus {
  Pending
  InProgress
  Completed
}

pub type TodoItem {
  TodoItem(id: String, text: String, status: TodoStatus)
}

pub const max_items = 20

pub fn validate(items: List(TodoItem)) -> Result(List(TodoItem), String) {
  let in_progress = list.filter(items, fn(i) { i.status == InProgress })
  case list.length(items) > max_items, list.length(in_progress) > 1 {
    True, _ -> Error("Too many items (max 20)")
    _, True -> Error("Only one task may be in-progress at a time")
    False, False -> Ok(items)
  }
}

pub fn render(items: List(TodoItem)) -> String {
  case items {
    [] -> "No todos."
    _ -> {
      let lines = list.map(items, fn(i) { marker(i.status) <> " " <> i.text })
      let done =
        list.length(list.filter(items, fn(i) { i.status == Completed }))
      string.join(lines, "\n")
      <> "\n("
      <> int.to_string(done)
      <> "/"
      <> int.to_string(list.length(items))
      <> " completed)"
    }
  }
}

fn marker(status: TodoStatus) -> String {
  case status {
    Pending -> "[ ]"
    InProgress -> "[>]"
    Completed -> "[x]"
  }
}
</script>
<script type="text/plain" id="src-agent_todo">
fn handle_todo(
  input: JsonValue,
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case parse_todos(input) {
    Error(message) -> #(message, True, state)
    Ok(items) ->
      case todos.validate(items) {
        Error(message) -> #(message, True, state)
        Ok(valid) -> #(
          todos.render(valid),
          False,
          AgentState(..state, todos: valid, idle_turns: 0),
        )
      }
  }
}

fn parse_todos(input: JsonValue) -> Result(List(TodoItem), String) {
  case input {
    JsonObject(fields) ->
      case list.key_find(fields, "items") {
        Ok(JsonArray(items)) -> list.try_map(items, parse_todo_item)
        _ -> Error("todo: expected an 'items' array")
      }
    _ -> Error("todo: input must be an object")
  }
}

fn append_results(state: AgentState, results: List(ContentBlock)) -> AgentState {
  let notes = background.drain(state.background)
  let extra = case notes {
    [] -> []
    _ -> [TextBlock(text: "<background-results>\n" <> background.render(notes) <> "\n</background-results>")]
  }
  let user_message = Message(role: User, content: list.append(results, extra))
  let state =
    AgentState(
      ..state,
      messages: list.append(state.messages, [user_message]),
      idle_turns: state.idle_turns + 1,
    )
  let open = list.any(state.todos, fn(item) { item.status != Completed })
  case state.config.enable_nag && state.idle_turns >= 3 && open {
    True -> {
      let nag = Message(role: User, content: [TextBlock(text: "Reminder: keep your todo list up to date.")])
      AgentState(..state, messages: list.append(state.messages, [nag]))
    }
    False -> state
  }
}

<script type="text/plain" id="src-skills">
import filepath
import gleam/dict.{type Dict}
import gleam/list
import gleam/result
import gleam/string
import simplifile

pub type Skill {
  Skill(name: String, description: String, body: String)
}

pub type SkillLoader {
  SkillLoader(skills: Dict(String, Skill))
}

pub fn load(directory: String) -> SkillLoader {
  case simplifile.is_directory(directory) {
    Ok(True) -> {
      let names = simplifile.read_directory(directory) |> result.unwrap([])
      let loaded = list.filter_map(names, fn(name) { try_load(directory, name) })
      SkillLoader(skills: dict.from_list(loaded))
    }
    _ -> SkillLoader(skills: dict.new())
  }
}

fn try_load(directory: String, name: String) -> Result(#(String, Skill), Nil) {
  let path = filepath.join(filepath.join(directory, name), "SKILL.md")
  case simplifile.read(path) {
    Ok(raw) -> {
      let skill = parse(name, raw)
      Ok(#(skill.name, skill))
    }
    Error(_) -> Error(Nil)
  }
}

fn parse(fallback_name: String, raw: String) -> Skill {
  case string.split(raw, "---") {
    [_, frontmatter, ..rest] -> {
      let name = field(frontmatter, "name") |> result.unwrap(fallback_name)
      let description = field(frontmatter, "description") |> result.unwrap("")
      let body = rest |> string.join("---") |> string.trim
      Skill(name:, description:, body:)
    }
    _ -> Skill(name: fallback_name, description: "", body: string.trim(raw))
  }
}

fn field(frontmatter: String, key: String) -> Result(String, Nil) {
  frontmatter
  |> string.split("\n")
  |> list.find_map(fn(line) {
    case string.split_once(line, ":") {
      Ok(#(found, value)) ->
        case string.trim(found) == key {
          True -> Ok(string.trim(value))
          False -> Error(Nil)
        }
      Error(_) -> Error(Nil)
    }
  })
}

pub fn menu(loader: SkillLoader) -> String {
  case dict.is_empty(loader.skills) {
    True -> ""
    False ->
      loader.skills
      |> dict.values
      |> list.sort(fn(a, b) { string.compare(a.name, b.name) })
      |> list.map(fn(skill) { "  - " <> skill.name <> ": " <> skill.description })
      |> string.join("\n")
  }
}

pub fn body_for(loader: SkillLoader, name: String) -> String {
  case dict.get(loader.skills, name) {
    Ok(skill) ->
      "<skill name=\"" <> name <> "\">\n" <> skill.body <> "\n</skill>"
    Error(_) -> "Unknown skill: " <> name
  }
}
</script>

<script type="text/plain" id="src-compact">
import claude_code/api.{
  type Client, type ContentBlock, type Message, Assistant, Message, TextBlock,
  ToolResultBlock, User,
}
import gleam/list
import gleam/result
import gleam/string

pub const keep_recent = 6

pub const token_threshold = 12_000

pub fn micro_compact(messages: List(Message)) -> List(Message) {
  let count = list.length(messages)
  list.index_map(messages, fn(message, index) {
    case index < count - keep_recent {
      True -> Message(..message, content: list.map(message.content, elide))
      False -> message
    }
  })
}

fn elide(block: ContentBlock) -> ContentBlock {
  case block {
    ToolResultBlock(tool_use_id:, content:, is_error:) ->
      case string.length(content) > 100 {
        True ->
          ToolResultBlock(
            tool_use_id:,
            content: "[earlier tool output elided]",
            is_error:,
          )
        False -> block
      }
    _ -> block
  }
}

pub fn estimate_tokens(messages: List(Message)) -> Int {
  messages
  |> list.fold(0, fn(total, message) { total + message_size(message) })
  |> divide_by_four
}

fn divide_by_four(chars: Int) -> Int {
  chars / 4
}

fn message_size(message: Message) -> Int {
  list.fold(message.content, 0, fn(total, block) {
    case block {
      TextBlock(text:) -> total + string.length(text)
      ToolResultBlock(content:, ..) -> total + string.length(content)
      _ -> total
    }
  })
}

pub fn auto_compact(
  messages: List(Message),
  client: Client,
  model: String,
) -> Result(List(Message), String) {
  case estimate_tokens(messages) > token_threshold {
    False -> Ok(messages)
    True -> {
      let prompt =
        "Summarise the key facts, decisions, and current state so work can continue:\n\n"
        <> transcript(messages)
      use response <- result.try(api.create_message(
        client,
        model,
        "You compress conversations faithfully.",
        [Message(role: User, content: [TextBlock(text: prompt)])],
        [],
        1024,
      ))
      Ok([
        Message(role: User, content: [
          TextBlock(
            text: "[Summary of earlier conversation]\n"
              <> extract_text(response.content),
          ),
        ]),
      ])
    }
  }
}

fn transcript(messages: List(Message)) -> String {
  messages
  |> list.map(fn(message) {
    let who = case message.role {
      User -> "User"
      Assistant -> "Assistant"
    }
    who <> ": " <> extract_text(message.content)
  })
  |> string.join("\n")
}

fn extract_text(content: List(ContentBlock)) -> String {
  content
  |> list.filter_map(fn(block) {
    case block {
      TextBlock(text:) -> Ok(text)
      _ -> Error(Nil)
    }
  })
  |> string.join(" ")
}
</script>

<script type="text/plain" id="src-tasks">
import filepath
import gleam/dynamic/decode.{type Decoder}
import gleam/int
import gleam/json.{type Json}
import gleam/list
import gleam/result
import gleam/string
import simplifile

pub type TaskStatus {
  TaskPending
  TaskActive
  TaskDone
}

pub type AgentTask {
  AgentTask(
    id: Int,
    subject: String,
    description: String,
    status: TaskStatus,
    blocked_by: List(Int),
    blocks: List(Int),
  )
}

pub type TaskStore {
  TaskStore(directory: String, next_id: Int)
}

pub fn init(directory: String) -> TaskStore {
  let _ = simplifile.create_directory_all(directory)
  TaskStore(directory:, next_id: scan_max_id(directory) + 1)
}

pub fn create(
  store: TaskStore,
  subject: String,
  description: String,
) -> Result(#(TaskStore, AgentTask), String) {
  let task =
    AgentTask(
      id: store.next_id,
      subject:,
      description:,
      status: TaskPending,
      blocked_by: [],
      blocks: [],
    )
  use _ <- result.try(write_task(store.directory, task))
  Ok(#(TaskStore(..store, next_id: store.next_id + 1), task))
}

pub fn set_status(
  store: TaskStore,
  id: Int,
  status: TaskStatus,
) -> Result(AgentTask, String) {
  use task <- result.try(read_task(store.directory, id))
  let updated = AgentTask(..task, status:)
  use _ <- result.try(write_task(store.directory, updated))
  case status {
    TaskDone -> {
      cascade_unblock(store.directory, id)
      Ok(updated)
    }
    _ -> Ok(updated)
  }
}

pub fn list_all(store: TaskStore) -> List(AgentTask) {
  scan_ids(store.directory)
  |> list.filter_map(fn(id) {
    read_task(store.directory, id) |> result.replace_error(Nil)
  })
}

pub fn get(store: TaskStore, id: Int) -> Result(AgentTask, String) {
  read_task(store.directory, id)
}

pub fn render(tasks: List(AgentTask)) -> String {
  case tasks {
    [] -> "No tasks."
    _ -> tasks |> list.map(render_one) |> string.join("\n")
  }
}

pub fn render_one(task: AgentTask) -> String {
  "#"
  <> int.to_string(task.id)
  <> " ["
  <> status_to_string(task.status)
  <> "] "
  <> task.subject
}

fn cascade_unblock(directory: String, completed: Int) -> Nil {
  list.each(scan_ids(directory), fn(id) {
    case read_task(directory, id) {
      Ok(task) ->
        case list.contains(task.blocked_by, completed) {
          True -> {
            let updated =
              AgentTask(
                ..task,
                blocked_by: list.filter(task.blocked_by, fn(b) {
                  b != completed
                }),
              )
            let _ = write_task(directory, updated)
            Nil
          }
          False -> Nil
        }
      Error(_) -> Nil
    }
  })
}

fn path_for(directory: String, id: Int) -> String {
  filepath.join(directory, int.to_string(id) <> ".json")
}

fn write_task(directory: String, task: AgentTask) -> Result(Nil, String) {
  simplifile.write(
    to: path_for(directory, task.id),
    contents: json.to_string(to_json(task)),
  )
  |> result.map_error(simplifile.describe_error)
}

fn read_task(directory: String, id: Int) -> Result(AgentTask, String) {
  use raw <- result.try(
    simplifile.read(path_for(directory, id))
    |> result.map_error(simplifile.describe_error),
  )
  json.parse(raw, decoder())
  |> result.replace_error("Could not parse task " <> int.to_string(id))
}

fn scan_ids(directory: String) -> List(Int) {
  simplifile.read_directory(directory)
  |> result.unwrap([])
  |> list.filter_map(fn(name) {
    case string.split_once(name, ".") {
      Ok(#(stem, "json")) -> int.parse(stem) |> result.replace_error(Nil)
      _ -> Error(Nil)
    }
  })
}

fn scan_max_id(directory: String) -> Int {
  scan_ids(directory) |> list.fold(0, int.max)
}

fn status_to_string(status: TaskStatus) -> String {
  case status {
    TaskPending -> "pending"
    TaskActive -> "in_progress"
    TaskDone -> "completed"
  }
}

fn to_json(task: AgentTask) -> Json {
  json.object([
    #("id", json.int(task.id)),
    #("subject", json.string(task.subject)),
    #("description", json.string(task.description)),
    #("status", json.string(status_to_string(task.status))),
    #("blocked_by", json.array(task.blocked_by, json.int)),
    #("blocks", json.array(task.blocks, json.int)),
  ])
}

fn decoder() -> Decoder(AgentTask) {
  use id <- decode.field("id", decode.int)
  use subject <- decode.field("subject", decode.string)
  use description <- decode.field("description", decode.string)
  use status <- decode.field("status", status_decoder())
  use blocked_by <- decode.field("blocked_by", decode.list(decode.int))
  use blocks <- decode.field("blocks", decode.list(decode.int))
  decode.success(AgentTask(
    id:,
    subject:,
    description:,
    status:,
    blocked_by:,
    blocks:,
  ))
}

fn status_decoder() -> Decoder(TaskStatus) {
  use raw <- decode.then(decode.string)
  case raw {
    "in_progress" -> decode.success(TaskActive)
    "completed" -> decode.success(TaskDone)
    _ -> decode.success(TaskPending)
  }
}
</script>
<script type="text/plain" id="src-agent_tasks">
fn handle_task_create(
  input: JsonValue,
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case get_string(input, "subject"), get_string(input, "description") {
    Ok(subject), Ok(description) ->
      case tasks.create(state.task_store, subject, description) {
        Ok(#(store, task)) -> #(
          tasks.render_one(task),
          False,
          AgentState(..state, task_store: store),
        )
        Error(message) -> #(message, True, state)
      }
    _, _ -> #("task_create needs subject and description", True, state)
  }
}

fn handle_task_update(
  input: JsonValue,
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case get_int(input, "id"), get_string(input, "status") {
    Ok(id), Ok(status) -> {
      let parsed = case status {
        "in_progress" -> TaskActive
        "completed" -> TaskDone
        _ -> TaskPending
      }
      case tasks.set_status(state.task_store, id, parsed) {
        Ok(task) -> #(tasks.render_one(task), False, state)
        Error(message) -> #(message, True, state)
      }
    }
    _, _ -> #("task_update needs id and status", True, state)
  }
}

fn handle_task_get(
  input: JsonValue,
  state: AgentState,
) -> #(String, Bool, AgentState) {
  case get_int(input, "id") {
    Ok(id) ->
      case tasks.get(state.task_store, id) {
        Ok(task) -> #(tasks.render_one(task), False, state)
        Error(message) -> #(message, True, state)
      }
    Error(message) -> #(message, True, state)
  }
}

<script type="text/plain" id="src-background">
import claude_code/internal/shell
import gleam/dict.{type Dict}
import gleam/erlang/process.{type Subject}
import gleam/int
import gleam/list
import gleam/otp/actor
import gleam/string

pub type JobStatus {
  JobRunning
  JobCompleted
  JobFailed
}

pub type Notification {
  Notification(job_id: String, status: JobStatus, output: String)
}

pub type Message {
  RunJob(command: String, reply: Subject(String))
  Drain(reply: Subject(List(Notification)))
  JobDone(Notification)
}

type State {
  State(
    jobs: Dict(String, JobStatus),
    notifications: List(Notification),
    cwd: String,
    next_job: Int,
    self: Subject(Message),
  )
}

pub fn start(cwd: String) -> Result(Subject(Message), actor.StartError) {
  let builder =
    actor.new_with_initialiser(1000, fn(self) {
      State(jobs: dict.new(), notifications: [], cwd:, next_job: 1, self:)
      |> actor.initialised
      |> actor.returning(self)
      |> Ok
    })
    |> actor.on_message(handle)

  case actor.start(builder) {
    Ok(started) -> Ok(started.data)
    Error(error) -> Error(error)
  }
}

pub fn run(manager: Subject(Message), command: String) -> String {
  process.call(manager, waiting: 5000, sending: fn(reply) {
    RunJob(command:, reply:)
  })
}

pub fn drain(manager: Subject(Message)) -> List(Notification) {
  process.call(manager, waiting: 5000, sending: fn(reply) { Drain(reply:) })
}

fn handle(state: State, message: Message) -> actor.Next(State, Message) {
  case message {
    RunJob(command:, reply:) -> {
      let job_id = "job-" <> int.to_string(state.next_job)
      let self = state.self
      let cwd = state.cwd
      let _ =
        process.spawn(fn() {
          let note = case shell.execute(command, cwd) {
            Ok(output) -> Notification(job_id:, status: JobCompleted, output:)
            Error(error) ->
              Notification(job_id:, status: JobFailed, output: error)
          }
          process.send(self, JobDone(note))
        })
      process.send(reply, job_id)
      actor.continue(
        State(
          ..state,
          next_job: state.next_job + 1,
          jobs: dict.insert(state.jobs, job_id, JobRunning),
        ),
      )
    }
    JobDone(note) ->
      actor.continue(
        State(
          ..state,
          notifications: [note, ..state.notifications],
          jobs: dict.insert(state.jobs, note.job_id, note.status),
        ),
      )
    Drain(reply:) -> {
      process.send(reply, list.reverse(state.notifications))
      actor.continue(State(..state, notifications: []))
    }
  }
}

pub fn render(notes: List(Notification)) -> String {
  case notes {
    [] -> "No completed background jobs."
    _ ->
      notes
      |> list.map(fn(note) {
        note.job_id <> " [" <> status_string(note.status) <> "]: " <> note.output
      })
      |> string.join("\n")
  }
}

fn status_string(status: JobStatus) -> String {
  case status {
    JobRunning -> "running"
    JobCompleted -> "completed"
    JobFailed -> "failed"
  }
}
</script>

var KW={
  gleam:['import','pub','fn','type','const','let','use','case','if','else','as','todo','panic','assert','external','opaque'],

function sp(c,t){return '<span class="'+c+'">'+esc(t)+'</span>';}
function hlLine(code,lang){
  var kws=KW[lang]||[],out='',i=0,n=code.length;
  function id(c){return /[A-Za-z0-9_]/.test(c);}
  while(i<n){
    var c=code[i];
    if(c==='/'&&code[i+1]==='/'){out+=sp('co',code.slice(i));break;}
    if(c==='#'&&(lang==='toml'||lang==='bash')){out+=sp('co',code.slice(i));break;}
    if(c==='%'&&lang==='erlang'){out+=sp('co',code.slice(i));break;}
    if(c==='"'){var j=i+1;while(j<n&&!(code[j]==='"'&&code[j-1]!=='\\'))j++;j++;if(j>n)j=n;out+=sp('str',code.slice(i,j));i=j;continue;}
    if(/[0-9]/.test(c)&&(i===0||!id(code[i-1]))){var k=i;while(k<n&&/[0-9_.]/.test(code[k]))k++;out+=sp('num',code.slice(i,k));i=k;continue;}
    if(id(c)){var m=i;while(m<n&&id(code[m]))m++;var w=code.slice(i,m),p=m;while(p<n&&code[p]===' ')p++;
      var cls=kws.indexOf(w)>=0?'kw':(/^[A-Z]/.test(w)?'ty':(code[p]==='('?'fn':'va'));out+=sp(cls,w);i=m;continue;}
    out+=esc(c);i++;
  }
  return out;
}
function srcOf(id){var e=document.getElementById('src-'+id);return e?e.textContent.replace(/^\n+/,'').replace(/\s+$/,''):'';}

function renderWalk(mod){
  var lines=srcOf(mod.key).split('\n');
  var codeHtml=lines.map(function(ln,idx){
    return '<div class="cl" data-n="'+(idx+1)+'"><span class="lno">'+(idx+1)+'</span><span class="src">'+(ln===''?' ':hlLine(ln,mod.lang||'gleam'))+'</span></div>';
  }).join('');
  var notesHtml=(mod.notes||[]).map(function(nt){
    var q=nt.q?'<details class="q"><summary>'+nt.q+'</summary><div class="a">'+nt.a+'</div></details>':'';
    return '<div class="note" data-lines="'+nt.lines+'"><span class="lb">lines '+nt.lines.replace(/-/g,'–')+'</span><p>'+nt.text+'</p>'+q+'</div>';
  }).join('');
  var top=mod.file?'<div class="code-top">'+esc(mod.file)+'</div>':'';
  return '<div class="walk"><div class="code" id="code-'+mod.key+'">'+top+codeHtml+'</div><div class="notes">'+notesHtml+'</div></div>';
}
function wireWalk(scope){
  scope.querySelectorAll('.note').forEach(function(note){
    var spec=note.getAttribute('data-lines');
    var walk=note.closest('.walk');var codeBox=walk.querySelector('.code');
    function matched(){return Array.prototype.filter.call(codeBox.querySelectorAll('.cl'),function(cl){return inRange(+cl.getAttribute('data-n'),spec);});}
    function set(on){matched().forEach(function(cl){cl.classList.toggle('hl',on);});}
    note.addEventListener('mouseenter',function(){set(true);});

    });
  });
}
