  ]}
  ,agent_dispatch:{key:'agent_dispatch',file:'src/claude_code/agent.gleam (dispatch)',lang:'gleam',notes:[
    {lines:'1-6',text:'Dispatch is one function: given a tool name, an input, and the state, return a triple of <code>#(result_text, is_error, new_state)</code>. The <code>case name { ... }</code> is the entire mechanism.',
      q:'Swift often keeps a dictionary mapping tool names to handler objects. Why does Gleam reach for a <code>case</code> instead?',
      a:'A <code>case</code> on a <code>String</code> needs no registry to populate and no objects to box. Adding a tool is one new branch; the dispatch is right here, readable top to bottom. It is the data structure <em>and</em> the documentation.'},
    {lines:'7-12',text:'The tools that exist by Stage&nbsp;4: bash, the three file tools, the todo list, and spawning a subagent. Each branch just calls a handler.'},
    {lines:'13-20',text:'The later-stage tools &mdash; skills, compaction, tasks, background jobs. Their handlers are defined in the stages that introduce them; the dispatch lists them all so you see the finished shape.'},
    {lines:'21-22',text:'The catch-all. An unknown tool name does not crash &mdash; it returns an error <em>result</em> (the <code>True</code> means is_error) that the model can read and recover from.'},
    {lines:'25-33',text:'<code>stateless</code> adapts a plain <code>Result(String, String)</code> into the triple, leaving state unchanged. Most tools do not touch <code>AgentState</code>, so this keeps their branches a single line.',
      q:'Why does <code>execute_tool</code> return a new <code>AgentState</code> at all, when bash and file tools do not change it?',
      a:'Some tools do (the todo list, creating a task). Returning state uniformly means the loop threads it the same way for every tool; the ones that do not change it just hand back what they got.'},
    {lines:'35-38',text:'<code>run_bash</code>: pull the <code>command</code> field out of the JSON input, then shell out. Two lines, both fallible, chained with <code>use</code>.'}
  ]}
  ,sandbox:{key:'sandbox',file:'src/claude_code/internal/sandbox.gleam',lang:'gleam',notes:[
    {lines:'1-3',text:'Tiny imports: path helpers and string/list utilities. This module exists only to answer one question safely.'},
    {lines:'5-9',text:'Turn the requested path into a full path: if it is already absolute use it, otherwise join it onto the working directory. We use <code>filepath.join</code> rather than gluing strings, so separators are correct on any OS.'},
    {lines:'10-11',text:'Reject any path containing a <code>..</code> segment outright &mdash; that is how an attacker climbs out of the workspace.'},
    {lines:'13-16',text:'Belt and braces: the resolved path must also start with the working directory. Only then do we return <code>Ok</code>.',
      q:'Why keep this in its own module instead of inlining the check in each file tool?',
      a:'Security logic changes for different reasons than file logic, and there must be exactly one definition of &ldquo;inside the workspace&rdquo; to audit. A tiny pure function like this is also trivial to unit-test: <code>resolve("../etc", "/work")</code> must be an <code>Error</code>.'}
  ]}
  ,file_ops:{key:'file_ops',file:'src/claude_code/internal/file_ops.gleam',lang:'gleam',notes:[
    {lines:'1-7',text:'Imports: the sandbox, our JSON field helper, path/int/string utilities, and <code>simplifile</code> for the actual disk access.'},
    {lines:'9-16',text:'<code>read_file</code> is a pipeline of fallible steps joined by <code>use</code>: get the path, sandbox-check it, read it. Any failure becomes the function&rsquo;s <code>Error</code>; the happy path falls through to <code>Ok(content)</code>.',
      q:'<code>simplifile.read</code> fails with a <code>FileError</code>, but this function returns a <code>String</code> error. What bridges the two?',
      a:'<code>|&gt; result.map_error(simplifile.describe_error)</code> converts the library&rsquo;s error type into a human-readable string, so every tool speaks the same error language.'},
    {lines:'18-36',text:'<code>write_file</code> adds two steps: make the parent directory (<code>create_directory_all</code>) and write. <code>use _ &lt;- ...</code> means &ldquo;run this for its effect; I don&rsquo;t need the value, but stop if it fails.&rdquo;'},
    {lines:'38-51',text:'<code>edit_file</code>: read, replace, write. It edits the file as a value &mdash; nothing is mutated in place; we compute the new contents and write them back.'},
    {lines:'53-58',text:'<code>replace_once</code> swaps only the <em>first</em> occurrence using <code>string.split_once</code>.',
      q:'Why replace only the first match rather than all of them?',
      a:'It forces the model to be precise about <em>which</em> spot it means. Replacing every match risks clobbering identical text elsewhere; a single, located edit is safer and matches the real Claude Code tool.'}
  ]}
  ,todos:{key:'todos',file:'src/claude_code/internal/todos.gleam',lang:'gleam',notes:[
    {lines:'1-3',text:'Imports for formatting and list work. The file is named <code>todos</code>, not <code>todo</code> &mdash; <code>todo</code> is a reserved keyword in Gleam (it marks unfinished code).'},
    {lines:'5-13',text:'Two types: the three states a task can be in, and the item itself. A status can only ever be one of these three &mdash; no stray strings to validate.'},
    {lines:'15-15',text:'A module constant. <code>pub const</code> values are compile-time fixed; note a const name may not start with an underscore.'},
    {lines:'17-24',text:'Validation matches on <em>two</em> conditions at once: too many items, or more than one in-progress. Each combination has a branch and the compiler checks they are all covered.',
      q:'Why <code>case a, b { ... }</code> instead of nesting two <code>case</code> expressions?',
      a:'Matching a tuple of conditions keeps the rules flat and readable, and the compiler still proves every combination of <code>True</code>/<code>False</code> is handled. Less nesting, same exhaustiveness guarantee.'},
    {lines:'26-40',text:'<code>render</code> turns the list into the text the model sees: one line per item plus a &ldquo;(done/total completed)&rdquo; tally. An empty list short-circuits to a friendly message.'},
    {lines:'42-48',text:'A private helper mapping each status to a checkbox glyph. Private because nothing outside this module needs it.'}
  ]}
  ,agent_todo:{key:'agent_todo',file:'src/claude_code/agent.gleam (todo handling)',lang:'gleam',notes:[
    {lines:'1-17',text:'The <code>todo</code> tool handler: parse the items, validate them, and on success return a <strong>new state</strong> with the fresh list and <code>idle_turns</code> reset to 0. The old state is never modified.',
      q:'How does the todo list &ldquo;persist&rdquo; between turns if we never mutate anything?',
      a:'It lives on <code>AgentState</code>. This handler returns a new state carrying the updated list; <code>run_tools</code> threads that forward into the loop, which feeds it into the next turn. Persistence by passing values, not by mutation.'},
    {lines:'19-28',text:'<code>parse_todos</code> reads the <code>items</code> array out of the JSON input. <code>list.try_map</code> applies a per-item parser (<code>parse_todo_item</code>, not shown) and fails fast if any item is malformed.'},
    {lines:'30-42',text:'<code>append_results</code> packages tool results into a user message and bumps <code>idle_turns</code>. (Lines 31&ndash;35 also fold in finished background jobs &mdash; that part belongs to Stage&nbsp;8; ignore it for now.)'},
    {lines:'43-50',text:'The nag: if nagging is enabled, several turns have passed with no todo update, and open items remain, append a gentle reminder. It fights the model&rsquo;s tendency to forget its plan deep in a long context.',
      q:'Why reset <code>idle_turns</code> to 0 inside the todo handler (line 13)?',
      a:'Calling the todo tool <em>is</em> updating the plan, so the idle counter restarts. The nag only fires after several turns where the model touched other tools but not its plan.'}
  ]}
  ,agent_config:{key:'agent_config',file:'src/claude_code/agent.gleam (config)',lang:'gleam',notes:[
    {lines:'1-3',text:'A <code>LoopConfig</code> captures everything that differs between a full agent and a restricted one: which tools are allowed, how many iterations are permitted, and whether to nag. The differences become <em>data</em>, not branches scattered through the loop.'},
    {lines:'5-15',text:'The default config: every tool, a high iteration cap, nagging on. This is what the top-level agent runs with.'},
    {lines:'17-25',text:'The subagent config: a small allowlist, a hard 30-iteration cap, no nag.',
      q:'Notice what is missing from the subagent&rsquo;s list: <code>agent</code>, <code>todo</code>, the task and background tools. Why hold those back?',
      a:'No <code>agent</code> prevents infinite recursion (subagents spawning subagents). No <code>todo</code>/task tools keep the child from meddling with the parent&rsquo;s plan. The cap stops a runaway. The restriction is expressed purely as a shorter list.'}
  ]}
  ,agent_subagent:{key:'agent_subagent',file:'src/claude_code/agent.gleam (subagent)',lang:'gleam',notes:[
    {lines:'1-2',text:'The <code>agent</code> tool handler: read the prompt the parent wants delegated.'},
    {lines:'3-10',text:'Build a <strong>fresh</strong> <code>AgentState</code> from the parent&rsquo;s: same client and skills, but a clean message history, the restricted config, and an empty todo list. Same record type &mdash; just different field values.'},
    {lines:'11-12',text:'Run the <em>same</em> <code>loop</code> we already have, then keep only the final text. <code>_discarded</code> throws away the subagent&rsquo;s entire conversation, so none of its file reads or shell output pollute the parent&rsquo;s context.',
      q:'In an object-oriented design you might subclass the agent for &ldquo;restricted mode&rdquo;. Why is no subclass needed here?',
      a:'The loop already takes its whole world as a parameter. A subagent is the same function called with different arguments &mdash; pure parameterisation. Reuse comes from passing data, not from inheritance.'}
  ]}
  ,skills:{key:'skills',file:'src/claude_code/internal/skills.gleam',lang:'gleam',notes:[
    {lines:'1-6',text:'Imports. <code>dict</code> gives us an in-memory index from skill name to skill; <code>simplifile</code> reads the files at startup.'},
    {lines:'8-14',text:'A <code>Skill</code> is a name, a one-line description, and a full body. The loader just holds a <code>Dict</code> of them &mdash; built once, read many times, never mutated.'},
    {lines:'16-25',text:'<code>load</code> scans a directory once at startup. If the directory does not exist, we return an empty loader instead of failing &mdash; graceful degradation: no skills configured is a valid state.'},
    {lines:'27-36',text:'For each subfolder, read its <code>SKILL.md</code>. A file that is missing or unreadable is simply skipped (the <code>Error(Nil)</code>), thanks to <code>list.filter_map</code> in <code>load</code>.'},
    {lines:'38-48',text:'Parse YAML-ish frontmatter by splitting on <code>---</code>: the middle chunk holds <code>name</code>/<code>description</code>, the rest is the body. No YAML library needed for two fields.'},
    {lines:'50-63',text:'<code>field</code> finds a <code>key: value</code> line. <code>list.find_map</code> returns the first line that both splits on <code>:</code> and matches the key.'},
    {lines:'65-75',text:'Layer 1, the cheap menu: one line per skill, always present in the system prompt. About 100 tokens total.',
      q:'Line 71 sorts with <code>fn(a, b) { string.compare(a.name, b.name) }</code>. Why not return a <code>Bool</code> like &ldquo;a &lt; b&rdquo;?',
      a:'<code>list.sort</code> expects a comparator returning an <code>Order</code> (<code>Lt</code>/<code>Eq</code>/<code>Gt</code>), not a boolean. <code>string.compare</code> already returns exactly that, so we hand it over directly &mdash; a classic slip when arriving from languages where sort wants &ldquo;is-less-than&rdquo;.'},
    {lines:'77-82',text:'Layer 2, the expensive body: returned only when the model explicitly calls <code>load_skill</code>. Unknown names get a friendly message rather than an error.'}
  ]}
  ,agent_sysprompt:{key:'agent_sysprompt',file:'src/claude_code/agent.gleam (constructor)',lang:'gleam',notes:[
    {lines:'1-21',text:'<code>new</code> is the constructor that wires every dependency &mdash; client, skills, task store, background actor &mdash; into the very first <code>AgentState</code>. After this, the loop just threads it forward.'},
    {lines:'23-32',text:'The system prompt bakes in the skill <em>menu</em> (Layer 1). If no skills are configured, the menu is empty and we use the base prompt unchanged.',
      q:'Why put the one-line menu in every request, but make the full body a tool call?',
      a:'The menu is tiny and constant, so it is cheap to always include and lets the model know what exists. Bodies can be thousands of tokens each &mdash; you only pay for one when the model decides it actually needs that skill. Cheap awareness, expensive detail on demand.'}
  ]}
  ,agent_skill:{key:'agent_skill',file:'src/claude_code/agent.gleam (load_skill)',lang:'gleam',notes:[
    {lines:'1-8',text:'The <code>load_skill</code> handler is a thin shim: read the requested name and return the skill body from the loader. All the real work happened once, at startup, in <code>skills.load</code>.'}
  ]}
  ,compact:{key:'compact',file:'src/claude_code/internal/compact.gleam',lang:'gleam',notes:[
    {lines:'1-6',text:'Imports. Compaction only ever transforms lists of messages, so it needs the API types and list/string helpers &mdash; nothing stateful.'},
    {lines:'8-10',text:'Two tunable constants: how many recent messages to leave untouched, and the token budget that triggers summarisation. Plain values, easy to find and change.'},
    {lines:'12-20',text:'Layer&nbsp;1, micro-compact: a pure <code>List(Message) -&gt; List(Message)</code>. It walks the messages with <code>index_map</code> and shortens old tool results, keeping the most recent few intact.',
      q:'Every compaction function here has type <code>List(Message) -&gt; List(Message)</code> (or a <code>Result</code> of one). Why does that shape make &ldquo;do nothing on failure&rdquo; trivial?',
      a:'Because the safe fallback is simply returning the input list unchanged. There is no half-mutated buffer to clean up &mdash; a pure transformation either produces a new list or you keep the old one. Compaction can never corrupt the conversation.'},
    {lines:'22-36',text:'<code>elide</code> replaces a long tool result with a short placeholder, leaving everything else alone. Short results are not worth shrinking.'},
    {lines:'38-56',text:'Token estimation without a tokenizer: sum the characters of text and tool-result content, divide by four. A rough heuristic is plenty for deciding when to summarise.'},
    {lines:'58-84',text:'Layer&nbsp;2, auto-compact: only if we are over budget, ask the model itself to summarise the transcript, and replace the whole history with that one summary message. Under budget, it returns the messages unchanged.',
      q:'Notice line 60 returns <code>Ok(messages)</code> when under threshold &mdash; the same type as the summarised result. Why is that nice for the caller?',
      a:'The caller writes one uniform line: &ldquo;compact, then use the result.&rdquo; Whether compaction happened or not, it gets back a valid message list. No special &ldquo;nothing to do&rdquo; branch leaks out.'},
    {lines:'86-111',text:'Helpers: render the transcript for the summariser, and pull the plain text out of the model&rsquo;s reply. Both are pure list transformations.'}
  ]}
  ,agent_compact:{key:'agent_compact',file:'src/claude_code/agent.gleam (compaction hook)',lang:'gleam',notes:[
    {lines:'1-9',text:'<code>compact_step</code> runs at the top of every loop turn: always micro-compact, then auto-compact if over budget. Crucially, if auto-compact errors (bad network, odd reply) we keep the <strong>original</strong> messages and carry on.',
      q:'Why is it safe &mdash; even correct &mdash; to just ignore a compaction failure?',
      a:'Compaction is an optimisation, never a requirement. The uncompacted history is always valid; the worst case of a failed compaction is using more tokens, not losing the conversation. So <code>Error(_) -&gt; state</code> is the right move.'},
    {lines:'11-16',text:'<code>handle_compact</code> is the explicit <code>compact</code> tool, letting the model summarise on demand rather than waiting for the threshold.'}
  ]}
  ,tasks:{key:'tasks',file:'src/claude_code/internal/tasks.gleam',lang:'gleam',notes:[
    {lines:'1-8',text:'Imports: JSON both ways, files, and helpers. There is no database &mdash; the filesystem is the store.'},
    {lines:'10-25',text:'The data: a task has an id, text, a status, and two dependency lists (<code>blocked_by</code> / <code>blocks</code>). Those lists are the edges of a directed graph.'},
    {lines:'27-34',text:'The store remembers a directory and the next id to hand out. <code>init</code> scans existing files to continue numbering after a restart.',
      q:'Why compute <code>next_id</code> by scanning the directory instead of keeping a counter in memory?',
      a:'Because the tasks outlive the process. After a restart there is no in-memory counter; the files on disk are the source of truth, so we derive the next id from them. The filesystem <em>is</em> the state.'},
    {lines:'36-50',text:'<code>create</code> writes a new task file and returns an updated store (with the bumped id). State change as a returned value, exactly like <code>AgentState</code>.'},
    {lines:'52-67',text:'<code>set_status</code> updates one task; when a task becomes done, it cascades.'},
    {lines:'69-95',text:'Read-side queries and rendering: list everything, get one, format for the model.'},
    {lines:'97-118',text:'The cascade: when a task completes, scan every other task and remove the completed id from its <code>blocked_by</code>. Tasks that lose their last blocker become runnable.'},
    {lines:'120-140',text:'The file layer: one JSON file per task, named by id. Reading and writing each go through <code>simplifile</code>, mapping errors to strings.',
      q:'Why one file per task instead of a single <code>tasks.json</code> holding the list?',
      a:'A crash mid-write can corrupt at most one task, not the whole plan, and two writers touching different tasks never collide on the same file. Per-file granularity buys atomicity and isolation for free.'},
    {lines:'142-170',text:'Scanning helpers: list ids by parsing <code>N.json</code> filenames, and find the maximum for <code>init</code>.'},
    {lines:'172-200',text:'The JSON bridge: encode a task to <code>Json</code> and decode one back, with a small mapping for the status strings &mdash; the same two-direction split we saw in <code>json_value</code>.'}
  ]}
  ,agent_tasks:{key:'agent_tasks',file:'src/claude_code/agent.gleam (task tools)',lang:'gleam',notes:[
    {lines:'1-17',text:'<code>task_create</code> writes a task and returns a new state carrying the updated store (its <code>next_id</code> advanced). Matching two <code>Result</code>s at once (<code>subject</code>, <code>description</code>) keeps the validation flat.'},
    {lines:'19-36',text:'<code>task_update</code> maps the status string to our enum and sets it &mdash; which may trigger the cascade. The store itself is unchanged, so we return the same state.'},
    {lines:'38-49',text:'<code>task_get</code> reads one task by id. Read-only, so subagents are allowed this and <code>task_list</code> but not create/update.'}
  ]}
  ,background:{key:'background',file:'src/claude_code/internal/background.gleam',lang:'gleam',notes:[
    {lines:'1-7',text:'Imports. <code>gleam/otp/actor</code> and <code>gleam/erlang/process</code> are the concurrency tools &mdash; the only place in the whole project we reach for them.'},
    {lines:'9-23',text:'The protocol. A job has a status; a <code>Notification</code> reports a finished job; and <code>Message</code> is what the actor accepts: <code>RunJob</code> and <code>Drain</code> are requests carrying a reply channel, while <code>JobDone</code> is an internal message a worker sends back.'},
    {lines:'25-33',text:'The private <code>State</code>. This is the single piece of state that genuinely changes over time in the entire system &mdash; and it lives <em>inside a process</em>, reachable only by sending messages.'},
    {lines:'35-49',text:'Start the actor. <code>new_with_initialiser</code> hands the actor its own <code>Subject</code> (its address). We stash that <code>self</code> in the state so workers can message the actor back, and return it to the caller as <code>started.data</code>.',
      q:'Why does the actor need a reference to <em>itself</em>?',
      a:'Background workers run in separate processes. When a job finishes, the worker must tell the manager &mdash; so the manager keeps its own address (<code>self</code>) in state and the worker sends <code>JobDone</code> to it. The initialiser is the one place that address is available.'},
    {lines:'51-59',text:'<code>run</code> and <code>drain</code> are the public, synchronous API. <code>process.call</code> sends a message bundled with a fresh reply channel and waits for the answer &mdash; turning message-passing back into an ordinary function call.'},
    {lines:'61-98',text:'The handler &mdash; the actor&rsquo;s &ldquo;loop&rdquo;. <code>RunJob</code> spawns a worker process, immediately replies with a job id, and records the job. <code>JobDone</code> files the notification. <code>Drain</code> hands back all notifications and clears them. Each returns the next state via <code>actor.continue</code>.',
      q:'Everywhere else we banned mutable state. Why is mutable state behind this actor safe, when a shared variable guarded by a lock is not?',
      a:'The actor handles one message at a time, in order, with no shared memory &mdash; so there are no races and no locks to forget. State changes are just the value returned from each handler. The mailbox serialises access for free; a lock makes you remember to do that yourself, correctly, every time.'},
    {lines:'100-116',text:'Rendering helpers for the notifications and statuses &mdash; ordinary pure functions, back outside the process.'}
  ]}
  ,agent_bg:{key:'agent_bg',file:'src/claude_code/agent.gleam (bg_run)',lang:'gleam',notes:[
    {lines:'1-11',text:'<code>bg_run</code> sends <code>RunJob</code> and returns the job id <em>immediately</em> &mdash; it does not wait for the command to finish. The agent keeps working; finished jobs are folded into a later turn by <code>append_results</code> (Stage&nbsp;3), which drains the actor.'}
  ]}
  /* MOD_INSERT */
};

var STAGES=[
  {id:'start',group:'Begin',nav:'How to read this',render:function(){return ''
    +'<span class="kicker"><span class="dot"></span> a line-by-line guide for tour-fresh Gleam</span>'
    +'<h1>Build a Claude Code agent <em>in Gleam</em></h1>'
    +'<p class="lead">You just finished the language tour and have never written Gleam &mdash; or much of anything &mdash; before. This guide builds a real coding agent the way Gleam wants it built, and walks every module <strong>line by line</strong>. The full code is verified: it compiles, with no gaps.</p>'
    +'<div class="box goal"><h4>How each page works</h4>'
    +'<p>On the left you see a complete, compiling module with line numbers. On the right, a note for every meaningful line. <strong>Hover a note</strong> to highlight the lines it talks about. Where there is a real design choice, a <strong>&ldquo;?&rdquo; question</strong> invites you to think first &mdash; click it to reveal the answer.</p></div>'
    +'<div class="box refresher"><h4>Gleam in 60 seconds (tour recap)</h4>'
    +'<p>Everything is an expression. There are no classes and no mutation: you make new values instead of changing old ones. <code>Result(ok, err)</code> is how functions report success or failure. The pipe <code>|&gt;</code> feeds a value into the next function. <code>use x &lt;- f(...)</code> is sugar that unwraps a <code>Result</code> and stops early on error. <code>case</code> matches the shape of data and must cover every possibility.</p></div>'
    +'<div class="box swift"><h4>About the Swift original</h4>'
    +'<p>This agent follows Ivan Magda&rsquo;s Swift series in <em>spirit</em>, but we never translate Swift line-for-line. Swift appears only as an occasional one-line aside (in orange) when contrasting a habit &mdash; like &ldquo;a class with mutable fields&rdquo; &mdash; with the Gleam way.</p></div>';}},

  {id:'architecture',group:'Begin',nav:'Architecture',render:function(){return ''
    +'<div class="view-head"><span class="view-n">MAP</span><h2>How the app is organised</h2></div>'
    +'<p class="lead">Before any code: what modules exist, what each one is responsible for, and which way they depend on each other. In Gleam you design with <em>modules and types</em>, not objects.</p>'
    +'<h3>One job per module</h3>'
    +'<table class="tbl">'
    +'<tr><td>claude_code</td><td>The entry point: <code>main</code> and the REPL loop that reads your input.</td></tr>'
    +'<tr><td>agent</td><td>The brain: the <code>AgentState</code> value, the recursive loop, and tool dispatch. Knows the tools, not the wire.</td></tr>'
    +'<tr><td>api</td><td>The wire: API data types, JSON encoders/decoders, and the one HTTP call. Knows nothing about tools.</td></tr>'
    +'<tr><td>json_value</td><td>A JSON value we can both read and write &mdash; the round-trip type tool inputs need.</td></tr>'
    +'<tr><td>internal/&hellip;</td><td>Implementation details: <code>shell</code>, <code>sandbox</code>, <code>file_ops</code>, <code>todos</code>, <code>skills</code>, <code>compact</code>, <code>tasks</code>, <code>background</code>. The <code>internal</code> folder signals &ldquo;not the public API&rdquo;.</td></tr>'
    +'</table>'
    +'<div class="diagram"><div class="dcap">Dependencies point inward, toward the core types</div>'
    +'<div class="fcol">'
    +'<div class="nd ink">claude_code.gleam<small>main + REPL</small></div><div class="ar">&darr;</div>'
    +'<div class="nd gl">agent.gleam<small>state &middot; loop &middot; dispatch</small></div><div class="ar">&darr;</div>'
    +'<div class="frow"><div class="nd">internal/shell</div><div class="nd">internal/file_ops</div><div class="nd">internal/todos</div><div class="nd">internal/skills</div></div>'
    +'<div class="frow"><div class="nd">internal/compact</div><div class="nd">internal/tasks</div><div class="nd">internal/background</div></div>'
    +'<div class="ar">&darr;</div><div class="nd gl">api.gleam &amp; json_value.gleam<small>types the whole system shares</small></div>'
    +'</div></div>'
    +'<div class="box refresher"><h4>Why so many small modules?</h4><p>A module that does one thing is easy to read, test, and change without fear. When the dangerous part (running shell commands, escaping the workspace) lives in its own tiny file, there is exactly one place to audit. Gleam has no &ldquo;library vs executable&rdquo; split to fight &mdash; every file under <code>src/</code> is importable &mdash; so folders are free to express intent.</p></div>';}},

  {id:'stage-0',group:'Foundation',nav:'0 · Bootstrap',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 0</span><h2>Project bootstrap</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Create the project and declare the libraries we will use. Notice that JSON arrives as <em>two</em> separate tools &mdash; encoding and decoding are not the same library.</p></div>'
    +'<p><code class="inl">gleam new claude_code</code> creates the skeleton. Then we fill in dependencies:</p>'
    +renderWalk({key:'gleam_toml',file:'gleam.toml',lang:'toml',notes:[
      {lines:'1-2',text:'Project name and version. The name must match the root module file, <code>src/claude_code.gleam</code>.'},
      {lines:'4-13',text:'Runtime dependencies. <code>gleam_stdlib</code> is the standard library; the rest are the specific capabilities the agent needs &mdash; HTTP, JSON, files, paths, environment, and (later) OTP processes.',
        q:'Why are <code>gleam_json</code> and the decode API counted as &ldquo;one&rdquo; capability but split across libraries?',
        a:'<code>gleam_json</code> only <em>encodes</em>. Decoding lives in the stdlib&rsquo;s <code>gleam/dynamic/decode</code>. The split is deliberate: it stops you from assuming a value is readable just because it was writable, and vice versa.'},
      {lines:'15-16',text:'Dev-only dependencies. Note the <strong>underscore</strong> in <code>[dev_dependencies]</code> &mdash; a hyphen here is silently ignored. Gleam is snake_case everywhere.'}
    ]})
    +'<div class="box swift"><h4>Swift aside</h4><p>The Swift project needs two SPM targets (a library plus an executable) so tests can import the code. Gleam has no such rule, so there is nothing to set up here beyond listing dependencies.</p></div>';}},

  {id:'stage-1',group:'Foundation',nav:'1 · API & loop',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 1</span><h2>The JSON value &amp; the API types</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Model the conversation as Gleam types and solve the JSON round-trip problem before anything else. The agent loop and HTTP client build on these foundations (continued on the next pages).</p></div>'
    +'<h3>The JSON round-trip type</h3>'
    +'<p>This little module is the most &ldquo;Gleam&rdquo; idea in the whole project, so we start here. Hover any note to light up its lines.</p>'
    +renderWalk(MODULES.json_value)
    +'<div class="box refresher"><h4>New tour idea: <code>decode.recursive</code> and <code>one_of</code></h4><p>A decoder describes <em>how</em> to read data. <code>one_of</code> tries alternatives in order; <code>recursive</code> lets a decoder reference itself for nested data. You compose small decoders into bigger ones, the same way you compose functions.</p></div>'
    +'<h3>Extension: testing the round-trip, the Gleam way</h3>'
    +'<p>We just built two halves &mdash; <code>to_json</code> <em>writes</em>, <code>decoder</code> <em>reads</em>. The most valuable test is not to check each one alone, but to prove they <strong>agree</strong>: encode a value, decode it straight back, and assert you got the same value. That single property is precisely what the agent leans on every time it echoes a tool input back to the API unchanged.</p>'
    +'<div class="box goal"><h4>Goal</h4><p>Write a handful of small <code>gleeunit</code> tests for <code>json_value</code> &mdash; one helper plus one assertion per shape &mdash; using only ideas from the language tour: <code>assert</code>, pipelines, and equality on values.</p></div>'
    +'<p><strong>Step 1 &mdash; make a test module.</strong> Create <code>test/json_value_test.gleam</code>. You do <em>not</em> write a <code>main</code> here: <code>gleeunit</code> scans the <code>test/</code> folder and runs every function whose name ends in <code>_test</code>. The generated <code>claude_code_test.gleam</code> already holds the one <code>main</code> that kicks things off.</p>'
    +'<p><strong>Step 2 &mdash; capture the property once.</strong> Write a tiny private helper that runs a value all the way out and back. Every test after that is a one-liner that calls it.</p>'
    +renderWalk(MODULES.json_value_test)
    +'<p><strong>Step 3 &mdash; fill in the rest yourself.</strong> Follow the &ldquo;your turn&rdquo; comment. Each new test is a single <code>assert</code>; lean on the helper so you never hand-write an expected JSON string, except where you deliberately want to pin the wire format (as in <code>encode_string_test</code>). Run the lot with <code class="inl">gleam test</code>.</p>'
    +'<div class="box refresher"><h4>New tour idea: <code>gleeunit</code> + <code>assert</code></h4><p>A test is just a public function ending in <code>_test</code> that runs <code>assert &lt;expression&gt;</code>. If the expression is <code>False</code> (or a pattern fails to match) the test fails with a readable message. No framework objects, no annotations &mdash; the same <code>assert</code> from the tour, discovered automatically across every module under <code>test/</code>.</p></div>'
    +'<div class="box swift"><h4>Swift aside</h4><p>Swift would add an <code>XCTestCase</code> subclass in a dedicated test target, with methods prefixed <code>test</code>. Gleam needs neither a class nor a separate target: any <code>_test</code> function under <code>test/</code> is collected for you.</p></div>'
    +'<h3>The API types &amp; HTTP client</h3>'
    +'<p>Now the wire. We model the conversation as types, then write one function that turns a request into a typed response. Every fallible step is a <code>Result</code>, chained with <code>use</code>.</p>'
    +renderWalk(MODULES.api)
    +'<h3>The agent loop</h3>'
    +'<p>This is the heartbeat. Hold its shape in your head &mdash; it never changes for the rest of the guide. Every later stage just adds a new tool branch.</p>'
    +'<div class="diagram"><div class="dcap">The invariant loop</div><div class="fcol">'
    +'<div class="frow"><div class="nd">user query</div><div class="ar">&rarr;</div><div class="nd ink">create_message<small>HTTP &rarr; API</small></div><div class="ar">&rarr;</div><div class="nd gl">stop_reason?<small>pattern match</small></div></div>'
    +'<div class="frow"><div class="nd dash">EndTurn / MaxTokens<small>return text, done</small></div><div class="ar">or</div><div class="nd" style="border-color:var(--green);color:var(--green)">ToolUseStop</div><div class="ar">&rarr;</div><div class="nd">run tools</div><div class="ar">&rarr;</div><div class="nd">append results</div></div>'
    +'<div class="loopback">&#8635; recurse with the new state &mdash; same function, one more message</div>'
    +'</div></div>'
    +renderWalk(MODULES.agent_loop)
    +'<div class="box swift"><h4>Swift aside</h4><p>Swift would write <code>final class Agent</code> with a mutable <code>messages</code> array and a <code>while true</code> loop that pushes onto it. Gleam has neither: the array becomes an immutable field, and <code>while true</code> becomes a tail-recursive <code>loop</code>. The behaviour is identical; the state is just honest about where it lives.</p></div>'
    +'<h3>Two doors out of Gleam: shell &amp; stdin</h3>'
    +'<p>Running commands and reading keyboard input aren&rsquo;t in the standard library &mdash; they truly live outside Gleam. We cross into Erlang at two tiny, clearly-marked boundaries. Being forced to name these is a feature: side effects can&rsquo;t sneak in elsewhere.</p>'
    +renderWalk(MODULES.shell)
    +renderWalk(MODULES.shell_erl)
    +renderWalk(MODULES.stdin)
    +'<div class="box refresher"><h4>New tour idea: FFI with <code>@external</code></h4><p>An <code>@external(erlang, "module", "function")</code> attribute attaches a Gleam type signature to a function written in Erlang (in a <code>.erl</code> file beside it). Gleam can&rsquo;t check the Erlang body, so you keep these boundaries tiny and return a <code>Result</code> so callers handle failure normally.</p></div>'
    +'<h3>main &amp; the REPL</h3>'
    +'<p>Finally, the entry point ties everything together and runs an interactive loop &mdash; itself recursive, threading state forward.</p>'
    +renderWalk(MODULES.main)
    +'<div class="box goal"><h4>What you can run now</h4><p>With an API key set, <code>gleam run</code> gives you a prompt. Type a request; the agent calls <code>bash</code>, feeds the output back, and answers. Everything after this stage is <em>more tools</em> hung off the same loop.</p></div>';}}

  ,{id:'stage-2',group:'Tools',nav:'2 · Files & dispatch',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 2</span><h2>Tool dispatch &amp; file tools</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Teach the agent to read, write, and edit files &mdash; safely. Watch dispatch grow from one branch to many without any registry, and meet the path sandbox that keeps the agent inside its workspace.</p></div>'
    +'<h3>Dispatch is just a <code>case</code></h3>'
    +'<p>Every tool the model can call funnels through one function. Adding a capability is adding a branch &mdash; nothing more.</p>'
    +renderWalk(MODULES.agent_dispatch)
    +'<div class="box swift"><h4>Swift aside</h4><p>A Swift design might register handler objects in a <code>[String: Handler]</code> dictionary. Forgetting to register one fails at runtime. Here the branches <em>are</em> the registry, visible in one place &mdash; and the catch-all turns an unknown name into a recoverable error, not a crash.</p></div>'
    +'<h3>The sandbox</h3>'
    +'<p>Before any file is touched, its path passes one gate. This is the only place that defines &ldquo;inside the workspace&rdquo;.</p>'
    +'<div class="diagram"><div class="dcap">One gate for every file path</div><div class="frow">'
    +'<div class="nd">requested path</div><div class="ar">&rarr;</div><div class="nd gl">join onto cwd</div><div class="ar">&rarr;</div><div class="nd">has &quot;..&quot; or escapes cwd?</div><div class="ar">&rarr;</div>'
    +'<div class="fcol"><div class="nd" style="border-color:var(--green);color:var(--green)">no &rarr; Ok(path)</div><div class="nd" style="border-color:var(--swift);color:var(--swift-ink)">yes &rarr; Error</div></div>'
    +'</div></div>'
    +renderWalk(MODULES.sandbox)
    +'<h3>The file handlers</h3>'
    +'<p>Each handler is a short pipeline of fallible steps. Read them as &ldquo;do this, and if it fails stop and report; otherwise carry on&rdquo;.</p>'
    +renderWalk(MODULES.file_ops)
    +'<div class="box refresher"><h4>New tour idea: <code>use _ &lt;- result.try(...)</code></h4><p>When you only care that a step <em>succeeded</em> (like writing a file) and not its return value, bind it to <code>_</code>. The chain still stops early on the first <code>Error</code>. It is the functional version of &ldquo;these statements run in order, and any one can fail&rdquo;.</p></div>';}}

  ,{id:'stage-3',group:'Tools',nav:'3 · Todo tool',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 3</span><h2>The todo tool</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Give the agent a structured notepad that rides along in <code>AgentState</code>, plus a gentle &ldquo;nag&rdquo; that reminds it to keep the plan current. This is the first state that visibly accumulates &mdash; and it does so without a single mutation.</p></div>'
    +'<h3>The todo module</h3>'
    +'<p>Pure data and pure functions: a list of items, a validator, and a renderer. No object owns the list; it is just a value.</p>'
    +renderWalk(MODULES.todos)
    +'<div class="box swift"><h4>Swift aside</h4><p>Swift would likely use a <code>class TodoManager</code> with a mutable <code>items</code> array and methods that change it in place. Here the list is a field on <code>AgentState</code> and every &ldquo;change&rdquo; produces a new state. No shared identity means nothing can edit it behind your back.</p></div>'
    +'<h3>Wiring it into the loop</h3>'
    +'<p>The handler validates the new list and returns a new state. The nag lives where tool results are appended.</p>'
    +renderWalk(MODULES.agent_todo)
    +'<div class="box refresher"><h4>New tour idea: record update <code>Record(..old, field: value)</code></h4><p>This makes a copy of <code>old</code> with one or more fields replaced. It is how an immutable program &ldquo;changes&rdquo; state: you never edit a value, you derive the next one. The compiler checks the field names exist.</p></div>';}}

  ,{id:'stage-4',group:'Orchestration',nav:'4 · Subagents',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 4</span><h2>Subagents</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Let the agent spawn a focused helper with a clean history, a restricted toolset, and an iteration cap. Only the helper&rsquo;s final answer returns &mdash; its intermediate work is discarded so the parent&rsquo;s context stays clean.</p></div>'
    +'<div class="diagram"><div class="dcap">Context isolation: only text crosses back</div><div class="frow">'
    +'<div class="nd ink">parent loop<small>full history</small></div><div class="ar">&rarr;</div>'
    +'<div class="nd gl">fresh state<small>clean messages<br>restricted config</small></div><div class="ar">&rarr;</div>'
    +'<div class="nd dash" style="border-color:var(--gleam)">child loop<small>history discarded</small></div><div class="ar">&rarr;</div>'
    +'<div class="nd" style="border-color:var(--green);color:var(--green)">final text only</div><div class="ar">&rarr;</div>'
    +'<div class="nd ink">parent continues</div>'
    +'</div></div>'
    +'<h3>Differences as data: <code>LoopConfig</code></h3>'
    +'<p>Instead of branching on &ldquo;am I a subagent?&rdquo; everywhere, we capture the differences in a small config value.</p>'
    +renderWalk(MODULES.agent_config)
    +'<h3>The handler reuses the loop</h3>'
    +renderWalk(MODULES.agent_subagent)
    +'<div class="box refresher"><h4>The big idea: reuse by parameterisation</h4><p>Because <code>loop</code> takes its state as a parameter, &ldquo;a restricted version of the agent&rdquo; is not a new type or a subclass &mdash; it is the same function with a different <code>AgentState</code> passed in, and a different choice of what to keep from the result.</p></div>';}}

  ,{id:'stage-5',group:'Orchestration',nav:'5 · Skill loading',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 5</span><h2>Skill loading</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>A two-layer skill system. Every skill&rsquo;s one-line description is always in the system prompt (cheap). The full body loads only when the model calls <code>load_skill</code> (expensive, on demand).</p></div>'
    +'<div class="diagram"><div class="dcap">Two layers, two costs</div><div class="frow">'
    +'<div class="fcol"><div class="nd gl">menu()<small>~1 line each, always</small></div><div class="nd">baked into system prompt</div></div>'
    +'<div class="ar">vs</div>'
    +'<div class="fcol"><div class="nd">model calls load_skill</div><div class="nd gl">body_for()<small>full text, only now</small></div></div>'
    +'</div></div>'
    +'<h3>The loader</h3>'
    +'<p>Built once at startup into an immutable dictionary; every later lookup is a pure read.</p>'
    +renderWalk(MODULES.skills)
    +'<h3>How the menu reaches the model</h3>'
    +'<p>The constructor folds the cheap menu into the system prompt; the tool serves the expensive body.</p>'
    +renderWalk(MODULES.agent_sysprompt)
    +renderWalk(MODULES.agent_skill)
    +'<div class="box refresher"><h4>New tour idea: <code>Dict</code> and startup-time work</h4><p>A <code>Dict(k, v)</code> is an immutable key-value map. We pay the cost of scanning the filesystem exactly once, store the result in a <code>Dict</code>, and from then on every lookup is cheap and pure &mdash; no caches to invalidate.</p></div>';}}

  ,{id:'stage-6',group:'Scale',nav:'6 · Compaction',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 6</span><h2>Context compaction</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Let the agent run forever by compressing old context. Two layers: cheap structural pruning on every turn, and model-driven summarisation when the conversation grows too big. Both are pure functions, and both fail safe.</p></div>'
    +'<div class="diagram"><div class="dcap">A pipeline of pure functions, run before each call</div><div class="frow">'
    +'<div class="nd">messages</div><div class="ar">&rarr;</div><div class="nd gl">micro_compact<small>prune old results</small></div><div class="ar">&rarr;</div>'
    +'<div class="nd">estimate_tokens<small>bytes / 4</small></div><div class="ar">&rarr;</div><div class="nd">over budget?</div><div class="ar">&rarr;</div><div class="nd gl">auto_compact<small>LLM summary</small></div>'
    +'</div><div class="loopback" style="border-color:var(--swift);color:var(--swift-ink);background:var(--swift-soft)">on any failure: return the ORIGINAL messages &mdash; compaction must never break the loop</div></div>'
    +'<h3>The compaction module</h3>'
    +renderWalk(MODULES.compact)
    +'<h3>Hooking it into the loop</h3>'
    +renderWalk(MODULES.agent_compact)
    +'<div class="box refresher"><h4>Why &ldquo;pure <code>List -&gt; List</code>&rdquo; matters</h4><p>Because each layer just maps an input list to an output list, the safe answer on any error is &ldquo;return what you were given&rdquo;. A compactor that mutated a shared buffer could leave it half-edited; a pure transformation cannot. Purity is what makes &ldquo;never crash the loop&rdquo; a one-liner.</p></div>';}}

  ,{id:'stage-7',group:'Scale',nav:'7 · Task DAG',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 7</span><h2>Task system (a file-based DAG)</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>A durable plan that survives compaction <em>and</em> restarts. Each task is one JSON file; dependencies form a directed graph; finishing a task unblocks the ones waiting on it.</p></div>'
    +'<div class="diagram"><div class="dcap">Tasks as files, dependencies as edges</div><div class="frow">'
    +'<div class="nd gl">#1 scaffold<small>completed</small></div><div class="ar">&rarr;</div>'
    +'<div class="fcol"><div class="nd">#2 api client<small>blocked_by [1]</small></div><div class="nd">#3 file tools<small>blocked_by [1]</small></div></div><div class="ar">&rarr;</div>'
    +'<div class="nd">#4 agent loop<small>blocked_by [2,3]</small></div></div>'
    +'<p style="font-family:\'JetBrains Mono\',monospace;font-size:.7rem;color:var(--muted);text-align:center;margin:.6rem 0 0">complete #1 &rarr; cascade removes &quot;1&quot; from #2 and #3 &rarr; both become runnable</p></div>'
    +'<h3>The task store</h3>'
    +'<p>No database &mdash; <code>simplifile</code> plus our JSON round-trip <em>is</em> the storage engine.</p>'
    +renderWalk(MODULES.tasks)
    +'<h3>The task tools</h3>'
    +renderWalk(MODULES.agent_tasks)
    +'<div class="box refresher"><h4>todo (Stage 3) vs. tasks (Stage 7)</h4><p>They look similar but answer different questions. <strong>todo</strong> is an ephemeral scratchpad on <code>AgentState</code> &mdash; cheap, flat, gone when the process exits. <strong>tasks</strong> are a durable dependency graph on disk &mdash; heavier, structured, restart-proof. Keeping them separate stops one from quietly swallowing the other&rsquo;s job.</p></div>';}}

  ,{id:'stage-8',group:'Scale',nav:'8 · Background jobs',render:function(){return ''
    +'<div class="view-head"><span class="view-n">STAGE 8</span><h2>Background tasks</h2></div>'
    +'<div class="box goal"><h4>Goal</h4><p>Run slow commands without blocking the agent. This needs the one piece of genuinely mutable, concurrent state in the whole system &mdash; and Gleam puts it behind a process mailbox, not a lock.</p></div>'
    +'<div class="diagram"><div class="dcap">The one mutable spot, behind a mailbox</div><div class="frow">'
    +'<div class="nd ink">agent loop<small>pure / immutable</small></div><div class="ar">&rarr;</div>'
    +'<div class="nd gl">background actor<small>jobs + notifications<br>(only mutable state)</small></div><div class="ar">&rarr;</div>'
    +'<div class="fcol"><div class="nd">worker process</div><div class="nd">worker process</div></div>'
    +'</div><div class="loopback">RunJob &rarr; spawn worker &rarr; worker sends JobDone back &rarr; Drain collects results</div></div>'
    +'<h3>The actor</h3>'
    +'<p>A long-lived process that owns its state and only ever changes it by receiving a message.</p>'
    +renderWalk(MODULES.background)
    +'<h3>The bg_run tool</h3>'
    +renderWalk(MODULES.agent_bg)
    +'<div class="box swift"><h4>Swift aside</h4><p>Swift has an <code>actor</code> keyword for thread-safe state. Gleam&rsquo;s answer is an OTP process: same guarantee (serialised access, no data races) but built from message-passing rather than compiler-enforced isolation. No locks, no <code>@MainActor</code> hops &mdash; just a mailbox.</p></div>';}}

  ,{id:'gleam-way',group:'Reference',nav:'★ The Gleam Way',render:function(){return ''
    +'<div class="view-head"><span class="view-n">RECAP</span><h2>The Gleam Way</h2></div>'
    +'<p class="lead">One recursive loop, fourteen tools, and a single mutable spot behind a mailbox. Every stage added exactly one mechanism &mdash; and the loop at the centre never changed shape.</p>'
    +'<h3>What each stage added</h3>'
    +'<table class="tbl">'
    +'<tr><td>0</td><td>Project &amp; dependencies; the encode/decode split.</td></tr>'
    +'<tr><td>1</td><td>JSON round-trip type, API types, the loop, FFI, REPL.</td></tr>'
    +'<tr><td>2</td><td>case dispatch, the path sandbox, file tools.</td></tr>'
    +'<tr><td>3</td><td>Todo list on state, the idle nag.</td></tr>'
    +'<tr><td>4</td><td>Subagents via a LoopConfig value (parameterisation).</td></tr>'
    +'<tr><td>5</td><td>Two-layer skill loading.</td></tr>'
    +'<tr><td>6</td><td>Three pure compaction layers, fail-safe.</td></tr>'
    +'<tr><td>7</td><td>File-based task DAG with cascade unblock.</td></tr>'
    +'<tr><td>8</td><td>One OTP actor for background jobs.</td></tr>'
    +'</table>'
    +'<h3>Seven habits that make it Gleam, not Swift-in-disguise</h3>'
    +'<div class="box"><p><strong>1. State is a record, not an object.</strong> Every &ldquo;method&rdquo; is a function: old <code>AgentState</code> in, new one out via <code>AgentState(..old, field: value)</code>.</p>'
    +'<p><strong>2. The loop is tail recursion.</strong> No <code>while</code>, no mutable counter. Each turn computes the next turn&rsquo;s arguments and recurses.</p>'
    +'<p><strong>3. Dispatch is a <code>case</code>.</strong> No registry, no protocol, no dictionary of closures &mdash; one tool, one branch, exhaustiveness checked.</p>'
    +'<p><strong>4. Errors are values.</strong> Every fallible step returns <code>Result</code>; <code>use</code> chains them; &ldquo;do nothing on failure&rdquo; is always available.</p>'
    +'<p><strong>5. Reuse by parameterisation.</strong> Subagents are the same loop with a different <code>LoopConfig</code> &mdash; inheritance never enters the picture.</p>'
    +'<p><strong>6. One mutable spot, behind a mailbox.</strong> Only background jobs need an actor; everything else is pure data flow.</p>'
    +'<p><strong>7. The filesystem is durable memory.</strong> Tasks are JSON files, skills are markdown, transcripts are text &mdash; <code>simplifile</code> is the query engine.</p></div>'
    +'<div class="box refresher"><h4>The one mindset shift</h4><p>In Swift you ask &ldquo;what object owns this state, and what methods mutate it?&rdquo; In Gleam you ask &ldquo;what value flows through which functions, and what new value comes out?&rdquo; Once that question replaces the first, every decision in this guide stops being a translation trick and becomes the obvious thing to do.</p></div>'
    +'<div class="box goal"><h4>All of it compiles</h4><p>Every snippet in this guide was taken from one project that builds with <code>gleam build</code> on Gleam 1.16 &mdash; zero errors, zero warnings, no stubs. You can read it top to bottom and trust that it runs.</p></div>';}}

function buildNav(){
  var groups=[],seen={};
  STAGES.forEach(function(s){if(!seen[s.group]){seen[s.group]=1;groups.push(s.group);}});
  var html='<span class="brand" onclick="show(\'start\')">claude_code<b>.gleam</b></span><span class="brand-sub">line-by-line tutorial</span>';
  groups.forEach(function(g){
    html+='<div class="nav-sec">'+g+'</div>';
    STAGES.filter(function(s){return s.group===g;}).forEach(function(s){
      html+='<a class="nav-link" data-id="'+s.id+'" onclick="show(\''+s.id+'\')"><span class="nav-n">&rsaquo;</span> '+s.nav+'</a>';
    });
  });
  document.getElementById('nav').innerHTML=html;
}
function show(id){
  var idx=STAGES.findIndex(function(s){return s.id===id;});if(idx<0)idx=0;
  var s=STAGES[idx];
  var prev=idx>0?STAGES[idx-1]:null,next=idx<STAGES.length-1?STAGES[idx+1]:null;
  var pager='<div class="pager">'
    +(prev?'<a onclick="show(\''+prev.id+'\')">&larr; '+prev.nav+'</a>':'<span></span>')
    +(next?'<a onclick="show(\''+next.id+'\')">'+next.nav+' &rarr;</a>':'<span></span>')+'</div>';
  var main=document.getElementById('content');
  main.innerHTML='<div class="view active">'+s.render()+pager+'</div>';
  wireWalk(main);
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.toggle('active',l.getAttribute('data-id')===id);});
  if(location.hash!=='#'+id)history.replaceState(null,'','#'+id);
  window.scrollTo(0,0);
}
buildNav();
show((location.hash||'#start').slice(1));
window.addEventListener('hashchange',function(){show(location.hash.slice(1));});
</script>
